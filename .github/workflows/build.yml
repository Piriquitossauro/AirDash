name: Build AirDash Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: cd plugin && mvn -B package

      - name: Upload AirDash.jar
        uses: actions/upload-artifact@v4
        with:
          name: AirDash
          path: plugin/target/AirDash-1.0.jar
